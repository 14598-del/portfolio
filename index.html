<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
background:linear-gradient(135deg,#ff8c42,#ffb347);
overflow:hidden;
height:100vh;
color:white;
}

/* Navbar */

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
}

.logo{
font-size:28px;
font-weight:bold;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
transition:.3s;
}

nav a:hover{
color:yellow;
}

/* Hero */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
z-index:2;
position:relative;
}

.hero h1{
font-size:65px;
margin-bottom:15px;
text-shadow:2px 2px 10px rgba(0,0,0,.2);
}

.hero h2{
font-size:30px;
font-weight:400;
}

.hero p{
margin-top:20px;
font-size:20px;
max-width:650px;
}

.btn{
margin-top:35px;
padding:15px 35px;
background:white;
color:#ff7b00;
border:none;
border-radius:50px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* Emoji */

.emoji{
position:absolute;
font-size:35px;
animation:float 5s infinite ease-in-out;
opacity:.9;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-25px);
}

100%{
transform:translateY(0px);
}

}

.e1{top:12%;left:10%;}
.e2{top:20%;right:15%;}
.e3{bottom:18%;left:15%;}
.e4{bottom:15%;right:10%;}

/* Confetti */

.confetti{
position:fixed;
width:10px;
height:18px;
top:-20px;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-20px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">🎓 Portfolio</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="personal.html">Information</a></li>
<li><a href="#">Education</a></li>
<li><a href="#">Activity</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<div class="hero">

<div class="emoji e1">🎉</div>
<div class="emoji e2">🎊</div>
<div class="emoji e3">✨</div>
<div class="emoji e4">🎈</div>

<h1>WELCOME</h1>

<h2>ณัฐณิชา แก้วไทรวาด</h2>

<p>
เว็บไซต์ Portfolio สำหรับนักเรียนชั้นมัธยมศึกษาปีที่ 6
พร้อมแสดงข้อมูล ประวัติการศึกษา กิจกรรม และผลงาน
</p>

<button class="btn">
Explore Portfolio
</button>

</div>

<script>

// Confetti

const colors=[
'#ff4d4d',
'#ffd93d',
'#6bcB77',
'#4d96ff',
'#ffffff',
'#ff7b00'
];

for(let i=0;i<180;i++){

const conf=document.createElement('div');

conf.classList.add('confetti');

conf.style.left=Math.random()*100+'vw';

conf.style.background=
colors[Math.floor(Math.random()*colors.length)];

conf.style.animationDuration=
(3+Math.random()*4)+'s';

conf.style.animationDelay=
Math.random()*5+'s';

conf.style.opacity=Math.random();

conf.style.transform=
'rotate('+Math.random()*360+'deg)';

document.body.appendChild(conf);

}

</script>

</body>
</html>
