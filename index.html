<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    background:linear-gradient(135deg,#FFF7ED,#FFD8A8,#FFB86B);
    overflow:hidden;
    height:100vh;
    position:relative;
}

/* พื้นหลัง */
.bg1,.bg2,.bg3{
    position:absolute;
    border-radius:50%;
    filter:blur(10px);
    opacity:.4;
}

.bg1{
    width:350px;
    height:350px;
    background:#ff8a00;
    top:-120px;
    left:-80px;
}

.bg2{
    width:280px;
    height:280px;
    background:#ffb347;
    right:-60px;
    top:120px;
}

.bg3{
    width:220px;
    height:220px;
    background:#ff7b00;
    bottom:-60px;
    left:45%;
}

/* Navbar */
nav{
    position:fixed;
    width:100%;
    padding:20px 70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#ff6a00;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav a{
    text-decoration:none;
    color:#444;
    font-weight:500;
}

nav a:hover{
    color:#ff7b00;
}

/* Hero */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:750px;
    padding:60px;
    border-radius:30px;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(18px);
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.card h2{
    color:#ff7b00;
    margin-bottom:10px;
}

.card h1{
    font-size:60px;
    color:#222;
}

.card p{
    margin:20px 0;
    color:#555;
    line-height:1.8;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#ff7b00;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-5px);
    background:#ff5e00;
}

/* Emoji */
.emoji{
    position:absolute;
    font-size:35px;
    animation:float 4s ease-in-out infinite;
}

.e1{top:120px;left:90px;}
.e2{top:180px;right:140px;}
.e3{bottom:100px;left:180px;}
.e4{bottom:120px;right:180px;}
.e5{top:80px;left:50%;}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

/* ดาว */
.star{
    position:absolute;
    color:white;
    animation:blink 2s infinite;
}

@keyframes blink{
    50%{
        opacity:.2;
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:18px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:768px){

nav{
padding:20px;
flex-direction:column;
gap:15px;
}

nav ul{
flex-wrap:wrap;
justify-content:center;
}

.card{
width:90%;
padding:35px;
}

.card h1{
font-size:42px;
}

}
</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="emoji e1">🎉</div>
<div class="emoji e2">🎊</div>
<div class="emoji e3">✨</div>
<div class="emoji e4">⭐</div>
<div class="emoji e5">🍊</div>

<div class="star" style="top:15%;left:35%;">✦</div>
<div class="star" style="top:75%;left:25%;">✦</div>
<div class="star" style="top:30%;right:25%;">✦</div>
<div class="star" style="top:80%;right:18%;">✦</div>

<nav>

<div class="logo">🍊 Portfolio</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="personal.html">Information</a></li>
<li><a href="education.html">Education</a></li>
<li><a href="activity.html">Activity</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<section class="hero">

<div class="card">

<h2>Hello! 👋</h2>

<h1>ณัฐณิชา แก้วไทรวาด</h1>

<p>
ยินดีต้อนรับสู่เว็บไซต์ Portfolio ของฉัน
รวบรวมข้อมูลส่วนตัว ประวัติการศึกษา กิจกรรม และผลงานต่าง ๆ
ขอบคุณที่เข้ามาเยี่ยมชม 🎉
</p>

<button onclick="location.href='information.html'">
Explore →
</button>

</div>

</section>

<script>
const colors=["#ff7b00","#ffd166","#ffffff","#ffb347"];

for(let i=0;i<120;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.animationDuration=(2+Math.random()*3)+"s";
c.style.animationDelay=Math.random()*1+"s";

document.body.appendChild(c);
}

setTimeout(()=>{
document.querySelectorAll(".confetti").forEach(e=>e.remove());
},5000);
</script>

</body>
</html>
